<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="screen">
        <div class="kitchen-decor decor-top" aria-hidden="true">
            <div class="photo-card chef"><img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=300&q=80" alt="Chef in kitchen"></div>
            <div class="photo-card food"><img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?auto=format&fit=crop&w=300&q=80" alt="Burger plate"></div>
            <div class="photo-card food"><img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=300&q=80" alt="Pasta dish"></div>
            <div class="photo-card chef"><img src="https://images.unsplash.com/photo-1600565193348-f74bd3c7ccdf?auto=format&fit=crop&w=300&q=80" alt="Chef cooking"></div>
            <div class="photo-card food"><img src="https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?auto=format&fit=crop&w=300&q=80" alt="Cupcakes"></div>
            <div class="photo-card food"><img src="https://images.unsplash.com/photo-1553621042-f6e147245754?auto=format&fit=crop&w=300&q=80" alt="Sushi platter"></div>
        </div>

        <div class="board-space">
            <h1>Lets Cook</h1>
            <div id="spin-section" class="spin-section">
                <h2>Spin To Pick First Player</h2>
                <div class="wheel-wrap">
                    <div id="start-wheel" class="start-wheel"></div>
                    <div class="wheel-pointer"></div>
                </div>
                <button id="spin-button">Spin The Wheel</button>
                <p id="spin-result" class="spin-result">Spin to decide: Red or Blue</p>
            </div>
            <div class="board">
                <!-- Numbered board will be generated by JS -->
            </div>
        </div>

        <div class="kitchen-decor decor-bottom" aria-hidden="true">
            <div class="photo-card food"><img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=300&q=80" alt="Salad bowl"></div>
            <div class="photo-card food"><img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=300&q=80" alt="Pizza slices"></div>
            <div class="photo-card chef"><img src="https://images.unsplash.com/photo-1577219491135-ce391730fb2c?auto=format&fit=crop&w=300&q=80" alt="Chef with dish"></div>
            <div class="photo-card food"><img src="https://images.unsplash.com/photo-1617093727343-374698b1b08d?auto=format&fit=crop&w=300&q=80" alt="Noodle bowl"></div>
            <div class="photo-card food"><img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=300&q=80" alt="Curry meal"></div>
            <div class="photo-card chef"><img src="https://images.unsplash.com/photo-1607631568010-a87245c0daf8?auto=format&fit=crop&w=300&q=80" alt="Chef plating food"></div>
        </div>

        <div class="controls">
            <div class="dice-controls">
                <div class="player-dice player-dice-red">
                    <div class="dice-box">
                        <div id="red-dice">1</div>
                    </div>
                    <button id="roll-red-button">Roll Red</button>
                </div>

                <div class="player-dice player-dice-blue">
                    <div class="dice-box">
                        <div id="blue-dice">1</div>
                    </div>
                    <button id="roll-blue-button">Roll Blue</button>
                </div>

                <button id="restart-button">Restart</button>
                <button id="reset-pawns-button">Reset Pawns</button>
            </div>

            <div class="scoreboards">
                <div class="score-box score-red">
                    <label>Red Score</label>
                    <span id="red-score">0</span>
                </div>
                <div class="score-box score-blue">
                    <label>Blue Score</label>
                    <span id="blue-score">0</span>
                </div>
            </div>
        </div>
    </div>
    <div id="winner-popup" class="winner-popup hidden" aria-live="polite"></div>
    <script src="script.js"></script>
</body>
</html>
